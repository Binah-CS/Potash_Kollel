</head>
<body>
  <nav class="navbar">
    <div class="container navbar__inner">
      <a href="index.html" class="navbar__logo">
        <img src="assets/images/shutafut_logo.png" alt="לוגו שותפות" />
      </a>
      <button class="navbar__hamburger" aria-label="תפריט" onclick="toggleNav()">☰</button>
      <ul class="navbar__links" id="navLinks">

        <li><a href="about.html" class="navbar__link">אודות הכולל</a></li>

        <li><a href="contact.html" class="navbar__link">צור קשר</a></li>
      </ul>
    </div>
  </nav>

  <section class="hero">
    <div class="hero__bg"></div>
    <div class="hero__overlay"></div>
    <div class="hero__content">
      <div class="hero__logo">
        <img src="assets/images/shutafut_logo.png" alt="לוגו השותפות" />
      </div>
      <h1 class="hero__title">אויף לאזן א מעסיז'</h1>
    </div>
  </section>

  <main class="container section">
    <div class="content-grid content-grid--two">
      <div class="card">
        <h2 class="section__title">אויף לאזן א מעסיז'</h2>
        <form class="form" onsubmit="submitContact(event)">
          <div class="form__group">
            <label class="form__label">שם מלא</label>
            <input class="form__input" type="text" name="name" placeholder="שם מלא" required />
          </div>
          <div class="form__group">
            <label class="form__label">מייל</label>
            <input class="form__input" type="email" name="email" placeholder="email@example.com" required />
          </div>
          <div class="form__group">
            <label class="form__label">טלפון</label>
            <input class="form__input" type="tel" name="phone" placeholder="050-000-0000" />
          </div>
          <div class="form__group">
            <label class="form__label">הודעה</label>
            <textarea class="form__textarea" name="message" placeholder="כתוב כאן את פנייתך" required></textarea>
          </div>
          <button class="btn" type="submit">שלח</button>
        </form>
      </div>
      <div class="card">
        <h2 class="section__title">פרטי קשר</h2>
        <p class="card__text">כולל שערי הכנה לתפילה</p>
        <p class="card__text"><a href="mailto:po0527634815@gmail.com">po0527634815@gmail.com</a></p>
        <p class="card__text"><a href="tel:+972527634815">972-52-7634815</a></p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>כולל שערי הכנה לתפילה בארץ ישראל</p>
      <p><a href="mailto:po0527634815@gmail.com">po0527634815@gmail.com</a> | <a href="tel:+972527634815">972-52-7634815</a></p>
    </div>
  </footer>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <button class="modal__close" onclick="closeModal()">✕</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="i18n.js" defer></script>
  <script src="main.js"></script>
</body>
</html>
