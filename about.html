<!DOCTYPE html>
<html lang="yi" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="meta.title-about"></title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="i18n.js" defer></script>
  <style>
    .hero__bg { background-image: url('assets/images/kollel_prospect.jpg'), linear-gradient(135deg, rgba(92, 61, 17, 0.55), rgba(196, 152, 42, 0.35)); }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container navbar__inner">
      <a href="index.html" class="navbar__logo">
        <img src="assets/images/shutafut_logo.png" data-i18n-alt="header.logoAlt" />
      </a>
      <button class="navbar__hamburger" data-i18n-aria-label="nav.menu" type="button" onclick="toggleNav()">☰</button>
      <ul class="navbar__links" id="navLinks">
        <li><a href="index.html" class="navbar__link" data-i18n="nav.home"></a></li>
        <li><a href="about.html" class="navbar__link" data-i18n="nav.about"></a></li>
        <li><a href="partnership.html" class="navbar__link" data-i18n="nav.partnership"></a></li>
        <li><a href="donate.html" class="navbar__link" data-i18n="nav.donate"></a></li>
        <li><a href="kvitel.html" class="navbar__link" data-i18n="nav.kvitel"></a></li>
        <li><a href="contact.html" class="navbar__link" data-i18n="nav.contact"></a></li>
      </ul>
    </div>
  </nav>

  <section class="hero">
    <div class="hero__bg"></div>
    <div class="hero__overlay"></div>
    <div class="hero__content">
      <div class="hero__logo">
        <img src="assets/images/kollel_logo.png" data-i18n-alt="header.kolelLogoAlt" />
      </div>
      <h1 class="hero__title" data-i18n="about.heroTitle"></h1>
    </div>
  </section>

  <main class="container section">
    <div class="image-grid">
      <div class="image-grid__item" onclick="openPreview('assets/images/kollel_logo.png', 'about.preview.logo')">
        <img src="assets/images/kollel_logo.png" data-i18n-alt="about.preview.logo" />
      </div>
      <div class="image-grid__item" onclick="openPreview('assets/images/kollel_prospect.jpg', 'about.preview.prospect')">
        <img src="assets/images/kollel_prospect.jpg" data-i18n-alt="about.preview.prospect" />
      </div>
      <div class="image-grid__item" onclick="openPreview('assets/images/kollel_doc_1.jpg', 'about.preview.doc1')">
        <img src="assets/images/kollel_doc_1.jpg" data-i18n-alt="about.preview.doc1" />
      </div>
      <div class="image-grid__item" onclick="openPreview('assets/images/kollel_doc_2.jpg', 'about.preview.doc2')">
        <img src="assets/images/kollel_doc_2.jpg" data-i18n-alt="about.preview.doc2" />
      </div>
      <div class="image-grid__item" onclick="openPreview('assets/images/kollel_doc_3.jpg', 'about.preview.doc3')">
        <img src="assets/images/kollel_doc_3.jpg" data-i18n-alt="about.preview.doc3" />
      </div>
      <div class="image-grid__item" onclick="openPreview('assets/images/kollel_doc_4.jpg', 'about.preview.doc4')">
        <img src="assets/images/kollel_doc_4.jpg" data-i18n-alt="about.preview.doc4" />
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p data-i18n="footer.tagline"></p>
      <p><a href="mailto:po0527634815@gmail.com" data-i18n="footer.email"></a> | <a href="tel:+972527634815" data-i18n="footer.phone"></a></p>
    </div>
  </footer>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <button class="modal__close" onclick="closeModal()">✕</button>
      <div id="modalBody"></div>
    </div>
  </div>
  
  <script src="i18n.js" defer></script>
  <script src="main.js"></script>
</body>
</html>
